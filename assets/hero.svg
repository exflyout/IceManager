<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#eef7ff"/><stop offset="1" stop-color="#f8fbff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5b8fc9" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 44px 'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;fill:#19324d}.sub{font:500 21px 'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;fill:#52657a}.label{font:700 24px 'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;fill:#25496d}.small{font:500 17px 'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;fill:#607286}.chip{font:700 16px 'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;fill:#2d70b8}
    </style>
  </defs>
  <rect width="1200" height="440" rx="36" fill="url(#bg)"/>
  <circle cx="1030" cy="80" r="120" fill="#d7ecff" opacity=".45"/>
  <circle cx="120" cy="360" r="160" fill="#e6f4ff" opacity=".8"/>
  <text x="70" y="95" class="title">ICEManager</text>
  <text x="70" y="138" class="sub">ICETALK 메시지와 공문에서 필요한 일정 · 할 일 · 안내 내용을 정리합니다.</text>
  <text x="70" y="172" class="sub">확인한 내용은 바탕화면과 Google에서 이어서 볼 수 있습니다.</text>
  <g filter="url(#shadow)">
    <rect x="75" y="235" width="235" height="116" rx="24" fill="#fff"/>
    <text x="105" y="285" class="label">ICETALK 메시지</text>
    <text x="105" y="320" class="small">받은 문장에서 필요한 내용 선택</text>
  </g>
  <path d="M330 292h92" stroke="#6aa7e8" stroke-width="6" stroke-linecap="round"/><path d="M422 292l-18-14v28z" fill="#6aa7e8"/>
  <g filter="url(#shadow)">
    <rect x="452" y="215" width="296" height="156" rx="28" fill="#fff"/>
    <text x="494" y="268" class="label">AI가 내용을 확인하고</text>
    <rect x="494" y="296" width="86" height="34" rx="17" fill="#e8f3ff"/><text x="517" y="319" class="chip">일정</text>
    <rect x="596" y="296" width="86" height="34" rx="17" fill="#fff1dc"/><text x="619" y="319" class="chip" fill="#b87400">할 일</text>
    <rect x="698" y="296" width="86" height="34" rx="17" fill="#e5f8ef"/><text x="721" y="319" class="chip" fill="#208353">메모</text>
  </g>
  <path d="M774 292h92" stroke="#6aa7e8" stroke-width="6" stroke-linecap="round"/><path d="M866 292l-18-14v28z" fill="#6aa7e8"/>
  <g filter="url(#shadow)">
    <rect x="896" y="235" width="235" height="116" rx="24" fill="#fff"/>
    <text x="926" y="285" class="label">확인 후 저장</text>
    <text x="926" y="320" class="small">DeskCal · Google Calendar · Tasks</text>
  </g>
</svg>
