<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520"><defs><style>.h{font:700 30px 'Segoe UI','Malgun Gothic',sans-serif;fill:#17324d}.t{font:500 18px 'Segoe UI','Malgun Gothic',sans-serif;fill:#5a6b7d}.b{font:700 19px 'Segoe UI','Malgun Gothic',sans-serif;fill:#263c55}.m{font:500 16px 'Segoe UI','Malgun Gothic',sans-serif;fill:#29384a}.s{font:500 14px 'Segoe UI','Malgun Gothic',sans-serif;fill:#697a8d}.card{fill:#fff;stroke:#dce8f5;stroke-width:2}</style><filter id="sh"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#6a95c8" flood-opacity=".16"/></filter></defs><rect width="1100" height="520" rx="28" fill="#f4f9ff"/><text x="56" y="64" class="h">03. ICETALK 작성 문장 정제</text><text x="56" y="96" class="t">작성 중인 문장을 선택하고, 말투를 고른 뒤 확인한 문장만 반영합니다.</text><g filter="url(#sh)"><rect x="70" y="145" width="405" height="285" rx="24" class="card"/><rect x="70" y="145" width="405" height="54" rx="24" fill="#243b63"/><text x="100" y="181" font-family="Segoe UI,Malgun Gothic" font-weight="700" font-size="18" fill="#fff">쪽지 작성</text><text x="105" y="240" class="m">안녕하세요, 선생님.</text><rect x="105" y="270" width="300" height="84" rx="13" fill="#eef5ff" stroke="#79aee7" stroke-width="2"/><text x="128" y="304" class="m">연수 신청 대상자 확인 후</text><text x="128" y="334" class="m">오늘 중 회신</text><text x="105" y="390" class="m">감사합니다.</text></g><path d="M505 286h85" stroke="#74aee9" stroke-width="7" stroke-linecap="round"/><path d="M590 286l-20-15v30z" fill="#74aee9"/><g filter="url(#sh)"><rect x="620" y="145" width="410" height="285" rx="24" class="card"/><text x="655" y="194" class="b">보낼 문장을 다듬으세요</text><rect x="655" y="220" width="78" height="36" rx="18" fill="#f4f7fb"/><text x="680" y="244" class="s">친근</text><rect x="748" y="220" width="78" height="36" rx="18" fill="#e8f3ff" stroke="#78aee8"/><text x="773" y="244" class="s">공손</text><rect x="841" y="220" width="78" height="36" rx="18" fill="#f4f7fb"/><text x="866" y="244" class="s">정중</text><rect x="655" y="282" width="150" height="92" rx="14" fill="#f7f9fc"/><text x="675" y="318" class="s">선택한 문장</text><text x="675" y="348" class="m">연수 신청 대상자</text><rect x="825" y="282" width="170" height="92" rx="14" fill="#f7f9fc"/><text x="845" y="318" class="s">다듬은 문장</text><text x="845" y="348" class="m">연수 신청 대상자를</text><text x="845" y="374" class="m">확인하신 후...</text><rect x="865" y="395" width="110" height="34" rx="17" fill="#2f7de1"/><text x="890" y="418" font-family="Segoe UI,Malgun Gothic" font-weight="700" font-size="14" fill="#fff">반영하기</text></g></svg>